name: 每日生成学习内容

on:
  schedule:
    # UTC 23:00 = 北京/香港时间次日早上 7:00
    - cron: "0 23 * * *"
  workflow_dispatch: {}  # 允许手动在 GitHub 网页上点击运行

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install anthropic

      - name: 生成今日内容
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_daily.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_content.json
          git diff --staged --quiet || git commit -m "每日内容更新: $(date +'%Y-%m-%d')"
          git push
